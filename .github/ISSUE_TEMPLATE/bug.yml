name: Bug Issue
description: Issue for reporting bugs.
title: "<Bug Title>"
labels: ["bug"]
projects: ["spe-uob/2025-FMCWRadar"]
body:
  - type: markdown
    attributes:
      value: |
        Please fill in the following information regarding your issue.
  - type: textarea
    id: feature-details
    attributes:
      label: "Bug Details"
      description: "Describe the details of the bug you are reporting. Include the actual vs expected behaviour."
      placeholder: "The bug is..."
    validations:
      required: true
  - type: textarea
    id: reproduction-steps
    attributes:
      label: "Reproduction Steps"
      description: "Describes the steps needed to be taken to reproduce the bug."
      value: |
        1.
        2.
        3.
        ...
    validations:
      required: false
  - type: dropdown
    id: where
    attributes:
      label: "Which area does the bug affect?"
      options:
        - ML model
        - Data visualizer
        - CI/CD
        - Documentation
    validations:
      required: false
  - type: textarea
    id: screenshot
    attributes:
      label: "Screenshots"
      description: "If applicable, add screenshots to help explain your problem."
      placeholder: "Copy an image to your clipboard and then paste it here with Ctl + V..."
      render: bash
    validations:
      required: false
  - type: textarea
    id: additional-information
    attributes:
      label: "Additional Information"
      description: "Describe any additional information required. "
      placeholder: "Additional information..."
    validations:
      required: false
  - type: checkboxes
    id: checklist
    attributes:
      label: "Checklist"
      description: "Tasks that must be completed before submitting issue."
      options:
        - label: "My description of the issue is detailed."
          required: true
        - label: "I have set all the issue metadata, including: assignee, labels, priority, story points, start date, end date, and milestone"
          required: true
