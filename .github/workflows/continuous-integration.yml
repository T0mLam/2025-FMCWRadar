name: Continuous Integration

on:
  push:
    branches:
      - main
      - dev

  pull_request:
    branches:
      - main
      - dev
  workflow_dispatch:

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Install Tkinter (python3-tk)
        run: sudo apt-get update && sudo apt-get install -y python3-tk

      - name: Install xvfb
        run: sudo apt-get install -y xvfb
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r model/requirements.txt

      - name: Run Python tests·
        run: |
          xvfb-run -a pytest --maxfail=1 --disable-warnings -q test/
      
      - name: Execute all Jupyter Notebooks
        run: |
          for notebook in $(find . -name '*.ipynb'); do
            echo "Executing $notebook ..."
            notebook_dir=$(dirname "$notebook")
            notebook_base=$(basename "$notebook")
            jupyter nbconvert \
              --to notebook --execute "$notebook" \
              --output "$notebook_base" --output-dir "$notebook_dir"
          done