name: Continuous Integration

on:
  push:
    branches: [main, dev, '**']
    
  pull_request: 
    branches: [main, dev, '**']
     
  workflow_dispatch:

jobs:
  pytest-test:
    runs-on: ubuntu-latest

    env:
      QT_QPA_PLATFORM: offscreen   
      
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v4
        with:
          python-version: "3.9"

      - run: |
          python -m pip install --upgrade pip
          pip install --no-cache-dir -r Applications_Visualizer/requirements.txt
          pip install pytest

      - run: pytest