name: Train Model on Push/Pull

on:
  push:
    branches: [ main, dev ]
  pull_request:
    branches: [ main, dev ]

jobs:
  train:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        # Add any additional dependencies needed for training
        
    - name: Train model
      run: |
        # Replace with your actual training command
        python train.py --data-path ./data --epochs 10
        
    - name: Save trained model
      uses: actions/upload-artifact@v3
      with:
        name: trained-model
        path: model_output/
        retention-days: 7