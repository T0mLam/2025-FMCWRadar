name: Train Model on Push/Pull

on:
  push:
    branches: [ main ]
    paths:
      - 'human_gait/**'
      - 'requirements.txt'
  pull_request:
    branches: [ main ]
    paths:
      - 'human_gait/**'
      - 'requirements.txt'

jobs:
  train:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'
        cache: 'pip'
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        
    - name: Train model
      working-directory: ./human_gait
      run: |
        python -m src.preprocess --raw-dir data/raw/deployment --processed-dir data/processed/deployment
        python train.py --data-path ./data/processed/deployment --model-save-dir ./models --epochs 10 
        
    - name: Verify model output
      working-directory: ./human_gait
      run: |
        echo "Contents of models directory:"
        ls -la models/
        if [ ! "$(ls -A models/)" ]; then
          echo "ERROR: Models directory is empty!"
          exit 1
        fi
        echo "Model files found successfully."    

        
    - name: Save trained model
      uses: actions/upload-artifact@v4
      with:
        name: trained-model
        path: human_gait/models
        retention-days: 7