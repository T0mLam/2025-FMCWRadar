name: Train Model on Push/Pull

on:
  push:
    branches: [ main, dev ]

jobs:
  train:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Build Docker image
      run: |
        docker build -f docker/Dockerfile.cd -t gait-model-trainer ./human_gait

    - name: Train model via Docker
      run: |
        # Mount the current directory so Docker can write to data/ and output/
        # Use -v to map local data to the /workspace path in your container
        mkdir -p ${{ github.workspace }}/human_gait/output
        docker run --rm \
          -v ${{ github.workspace }}/human_gait/data:/workspace/data \
          -v ${{ github.workspace }}/human_gait/output:/workspace/output \
          gait-model-trainer
        
    - name: Verify model output
      working-directory: ./human_gait
      run: |
        echo "Checking the output directory..."
        ls -R output/
        # Check if output directory exists and is not empty
        if [ ! -d "output" ] || [ -z "$(ls -A output/)" ]; then
          echo "ERROR: Models directory is missing or empty!"
          exit 1
        fi
        echo "Model artifacts and training logs found successfully."

        
    - name: Generate release tag
      id: tag
      run: |
        # Create a unique tag using date and short commit SHA
        TAG="v$(date +'%Y%m%d%H%M%S')-${GITHUB_SHA::7}"
        echo "tag=$TAG" >> "$GITHUB_OUTPUT"
        echo "Generated tag: $TAG"

    - name: Package model artifacts
      run: |
        cd human_gait/output
        tar -czvf ${{ github.workspace }}/gait-model-artifacts.tar.gz train_*

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: ${{ steps.tag.outputs.tag }}
        name: "Model Training - ${{ steps.tag.outputs.tag }}"
        body: |
          ## Automated Model Training Release
          
          **Branch:** `${{ github.ref_name }}`
          **Commit:** `${{ github.sha }}`
          **Triggered by:** @${{ github.actor }}
          
          This release contains the trained gait recognition model artifacts.
        files: |
          gait-model-artifacts.tar.gz
        draft: false
        prerelease: ${{ github.ref_name != 'main' }}
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}