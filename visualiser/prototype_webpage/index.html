<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Posture Detection</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="visual-box"></div>  <!-- This is the area where the data would be visualised -->
        <div>
            <div class="status-card">
                <h2>STANDING</h2>
                <div class="confidence-bar">_% Confident</div>
            </div>
            <div class="buttons">
                <button class="button">SITTING</button>
                <button class="button">LAYING</button>
            </div>
            <div class="info">
                Model: <select><option>Posture</option></select><br>
                Confidence Threshold: <span>_%</span><br>
                UART Port: <span>_</span> <span class="connected">(Connected)</span>
            </div>
        </div>
    </div>
</body>
</html>
